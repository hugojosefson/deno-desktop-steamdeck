name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2

      - name: Build release
        env:
          OPENOBSERVE_URL: ${{ secrets.OPENOBSERVE_URL }}
          OPENOBSERVE_TOKEN: ${{ secrets.OPENOBSERVE_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p' || echo "")
          if [ -n "${PREV_TAG}" ]; then
            export PREV_VERSION="${PREV_TAG#v}"
          fi
          deno task release

      - name: Verify artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hello.tar.gz
            dist/patch-*.bin
          generate_release_notes: true
