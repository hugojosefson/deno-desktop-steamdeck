name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Build AppImage
        env:
          OPENOBSERVE_URL: ${{ secrets.OPENOBSERVE_URL }}
          OPENOBSERVE_TOKEN: ${{ secrets.OPENOBSERVE_TOKEN }}
        run: deno task build

      - name: Verify artifact
        run: ls -la ./dist/hello

      - name: Update release manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          deno eval "
            const j = JSON.parse(Deno.readTextFileSync('release/latest.json'));
            j.version = '$VERSION';
            Deno.writeTextFileSync('release/latest.json', JSON.stringify(j, null, 2) + '\n');
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/latest.json
          git commit -m "chore: update release manifest to $GITHUB_REF_NAME" || true

      - name: Push manifest
        run: git push origin HEAD:main

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hello
          generate_release_notes: true
